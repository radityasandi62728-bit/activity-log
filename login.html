<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tracker App</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="scanlines"></div>
            
            <h1 class="cyber-title">PROJECT MATE</h1>
            
            <div class="cyber-description">
                <p>Otentikasi diperlukan untuk mengakses sistem pelacakan.</p>
                <p>Silakan masukkan kredensial Anda untuk menyinkronkan data, melanjutkan rentetan aktivitas, dan memantau progres harian Anda.</p>
            </div>

            <form action="Main.html" class="cyber-form">
                <div class="input-group">
                    <input type="text" id="username" required autocomplete="off" placeholder=" ">
                    <label for="username">NAMA PENGGUNA</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">KATA SANDI</label>
                </div>

                <button type="submit" class="cyber-button">
                    <span class="button-text">INISIALISASI LOGIN</span>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
